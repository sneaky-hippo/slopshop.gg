<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>slopshop / memory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090b;
      --surface: #111113;
      --surface2: #18181b;
      --surface3: #1e1e22;
      --border: #1e1e22;
      --border-hover: rgba(0,212,255,0.3);
      --accent: #00D4FF;
      --accent-dim: rgba(0,212,255,0.08);
      --accent-dim2: rgba(0,212,255,0.04);
      --text: #fafafa;
      --muted: #71717a;
      --muted2: #52525b;
      --danger: #ef4444;
      --danger-dim: rgba(239,68,68,0.12);
      --success: #22c55e;
      --warning: #f59e0b;
      --radius: 8px;
      --font: 'Inter', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── NAV ── */
    #nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 24px;
      z-index: 100;
    }
    #nav-logo {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0;
    }
    #nav-logo .slash { color: var(--muted); margin: 0 4px; }
    #nav-logo .section { color: var(--accent); }
    #nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
      flex: 1;
    }
    #nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    #nav-links a:hover { color: var(--text); background: var(--surface2); }
    #nav-links a.active { color: var(--accent); background: var(--accent-dim); }
    #nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }
    #ns-global-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }
    #ns-global-select:focus { border-color: var(--accent); }
    #user-email {
      font-size: 12px;
      color: var(--muted);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── LAYOUT ── */
    #app {
      display: flex;
      height: 100vh;
      padding-top: 52px;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 192px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 10px 8px 20px;
    }
    #sidebar::-webkit-scrollbar { width: 3px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted2);
      padding: 8px 8px 4px;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      transition: background 0.12s, color 0.12s;
      user-select: none;
      gap: 6px;
    }
    .sidebar-item:hover { background: var(--surface2); color: var(--text); }
    .sidebar-item.active { background: var(--accent-dim); color: var(--accent); }
    .sidebar-item .ns-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sidebar-item .badge {
      background: var(--surface3);
      color: var(--muted2);
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
      flex-shrink: 0;
    }
    .sidebar-item.active .badge { background: rgba(0,212,255,0.15); color: var(--accent); }

    #search-shortcut {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--muted);
      font-size: 12px;
      border: 1px solid var(--border);
      margin: 2px 0 6px;
      transition: border-color 0.15s, color 0.15s;
    }
    #search-shortcut:hover { border-color: var(--accent); color: var(--text); }
    #search-shortcut .shortcut-key {
      margin-left: auto;
      background: var(--surface2);
      font-size: 10px;
      font-family: var(--mono);
      padding: 1px 5px;
      border-radius: 4px;
      color: var(--muted2);
    }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 8px 0;
    }

    #add-namespace-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      border: 1px dashed var(--border);
      margin-top: 4px;
      transition: border-color 0.15s, color 0.15s;
      background: none;
      width: 100%;
      text-align: left;
      font-family: var(--font);
    }
    #add-namespace-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── MAIN ── */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-width: 0;
    }

    /* ── LIST AREA ── */
    #list-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    #list-header {
      padding: 14px 20px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
      background: var(--surface);
    }

    #list-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #list-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    #new-memory-btn {
      background: var(--accent);
      color: #09090b;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font);
      transition: opacity 0.15s;
      letter-spacing: 0.01em;
    }
    #new-memory-btn:hover { opacity: 0.85; }

    #search-bar-wrap {
      position: relative;
    }
    #search-icon-el {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }
    #search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 8px 32px 8px 34px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s;
    }
    #search-input:focus { border-color: var(--accent); }
    #search-input::placeholder { color: var(--muted); }
    #search-clear-btn {
      position: absolute;
      right: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      cursor: pointer;
      display: none;
      background: none;
      border: none;
      font-size: 15px;
      line-height: 1;
      padding: 3px;
      border-radius: 3px;
    }
    #search-clear-btn:hover { color: var(--text); }

    #list-meta {
      font-size: 11px;
      color: var(--muted);
      padding: 6px 20px 0;
      flex-shrink: 0;
      height: 24px;
      display: flex;
      align-items: center;
    }

    #cards-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px 40px;
      position: relative;
    }
    #cards-container::-webkit-scrollbar { width: 5px; }
    #cards-container::-webkit-scrollbar-track { background: transparent; }
    #cards-container::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

    #cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 10px;
    }

    /* ── LOADING OVERLAY ── */
    #loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(9,9,11,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      backdrop-filter: blur(2px);
    }
    .loading-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    /* ── EMPTY STATE ── */
    #empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
      text-align: center;
      gap: 14px;
    }
    .empty-icon {
      width: 60px;
      height: 60px;
      background: var(--surface2);
      border-radius: 16px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }
    #empty-state h3 { font-size: 15px; font-weight: 600; }
    #empty-state p { font-size: 12px; color: var(--muted); max-width: 260px; line-height: 1.6; }
    #empty-cta {
      background: var(--accent);
      color: #09090b;
      border: none;
      border-radius: 6px;
      padding: 7px 16px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font);
      margin-top: 4px;
    }
    #empty-cta:hover { opacity: 0.85; }

    /* ── MEMORY CARD ── */
    .memory-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      cursor: pointer;
      position: relative;
      transition: border-color 0.15s, background 0.15s;
      overflow: hidden;
    }
    .memory-card:hover { border-color: var(--border-hover); }
    .memory-card:hover .card-delete { opacity: 1; pointer-events: all; }
    .memory-card.selected {
      border-color: var(--accent);
      background: var(--accent-dim2);
    }
    .card-key {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
      padding-right: 40px;
    }
    .card-value {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 10px;
      word-break: break-word;
    }
    .card-footer {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .type-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .type-note    { background: rgba(139,92,246,0.15); color: #a78bfa; }
    .type-fact    { background: rgba(34,197,94,0.12);  color: #4ade80; }
    .type-event   { background: rgba(245,158,11,0.12); color: #fbbf24; }
    .type-project { background: rgba(59,130,246,0.12); color: #60a5fa; }
    .type-code    { background: rgba(0,212,255,0.12);  color: var(--accent); }
    .type-general { background: rgba(113,113,122,0.18); color: var(--muted); }
    .card-score {
      font-size: 10px;
      color: var(--muted2);
      font-family: var(--mono);
    }
    .card-date {
      font-size: 10px;
      color: var(--muted2);
      margin-left: auto;
    }
    .card-delete {
      position: absolute;
      top: 10px;
      right: 10px;
      opacity: 0;
      pointer-events: none;
      background: var(--danger-dim);
      border: 1px solid rgba(239,68,68,0.2);
      color: var(--danger);
      border-radius: 5px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: opacity 0.15s, background 0.15s;
    }
    .card-delete:hover { background: rgba(239,68,68,0.22); }
    .score-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      border-radius: 0 2px 0 var(--radius);
    }

    /* ── RIGHT PANEL ── */
    #right-panel {
      width: 0;
      flex-shrink: 0;
      border-left: none;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.18s ease, border 0.18s;
    }
    #right-panel.open {
      width: 380px;
      border-left: 1px solid var(--border);
    }

    #panel-header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #panel-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    #panel-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 17px;
      line-height: 1;
      padding: 3px 5px;
      border-radius: 4px;
      transition: color 0.12s, background 0.12s;
    }
    #panel-close:hover { color: var(--text); background: var(--surface2); }

    #panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #panel-body::-webkit-scrollbar { width: 4px; }
    #panel-body::-webkit-scrollbar-track { background: transparent; }
    #panel-body::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

    #panel-footer {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── FORM ELEMENTS ── */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
    }
    .field-label .opt {
      color: var(--muted2);
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
      font-size: 10px;
    }
    .field-input, .field-textarea, .field-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 7px 10px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .field-input:focus, .field-textarea:focus, .field-select:focus {
      border-color: var(--accent);
    }
    .field-input::placeholder, .field-textarea::placeholder { color: var(--muted2); }
    .field-textarea {
      resize: vertical;
      min-height: 90px;
      line-height: 1.6;
      font-size: 12px;
    }
    .field-textarea.large { min-height: 140px; }
    .field-select { cursor: pointer; }
    .mono { font-family: var(--mono); font-size: 12px; }

    /* Detail key row */
    .detail-key-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
    }
    .detail-key-text {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .copy-btn {
      background: var(--surface3);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--font);
      white-space: nowrap;
      flex-shrink: 0;
      transition: color 0.12s, border-color 0.12s;
      font-weight: 500;
    }
    .copy-btn:hover { color: var(--accent); border-color: rgba(0,212,255,0.4); }

    /* Meta grid */
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .meta-cell {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 9px;
    }
    .meta-cell-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted2);
      margin-bottom: 2px;
    }
    .meta-cell-value {
      font-size: 11px;
      color: var(--text);
      word-break: break-all;
    }

    .tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .tag-chip {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(0,212,255,0.2);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    /* Buttons */
    .btn {
      border: none;
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: opacity 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #09090b; }
    .btn-danger  { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
    .btn-ghost   { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); opacity: 1; }
    .btn-expand { flex: 1; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 13px;
      height: 13px;
      border: 2px solid rgba(0,212,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOASTS ── */
    #toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 7px;
      pointer-events: none;
    }
    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 220px;
      max-width: 320px;
      pointer-events: all;
      animation: toastIn 0.18s ease;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--danger); }
    .toast.info    { border-left: 3px solid var(--accent); }
    .toast-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .toast.success .toast-dot { background: var(--success); }
    .toast.error   .toast-dot { background: var(--danger); }
    .toast.info    .toast-dot { background: var(--accent); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(16px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; max-height: 60px; }
      to   { opacity: 0; max-height: 0; padding: 0; margin: 0; }
    }

    /* ── NAMESPACE MODAL ── */
    #modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    #modal-backdrop.open { display: flex; }
    #ns-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    #ns-modal h3 { font-size: 14px; font-weight: 600; }
    #ns-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  </style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <a href="/" id="nav-logo">
    slopshop<span class="slash">/</span><span class="section">memory</span>
  </a>
  <div id="nav-links">
    <a href="/brain">Dashboard</a>
    <a href="/dream-studio">Dreams</a>
    <a href="/team-hives">Hive</a>
    <a href="/memory-hub" class="active">Memory</a>
    <a href="/profile">Profile</a>
  </div>
  <div id="nav-right">
    <select id="ns-global-select" title="Active namespace"></select>
    <div id="user-email">—</div>
  </div>
</nav>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-section-label">Quick</div>
    <div id="search-shortcut" title="Focus search (⌘K)">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="6.5" cy="6.5" r="5"/><path d="m11 11 3 3"/></svg>
      Search
      <span class="shortcut-key">⌘K</span>
    </div>

    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label">Namespaces</div>
    <div id="ns-list"></div>
    <button id="add-namespace-btn">+ New Namespace</button>
  </aside>

  <!-- MAIN -->
  <div id="main">

    <!-- LIST AREA -->
    <div id="list-area">
      <div id="list-header">
        <div id="list-title-row">
          <div id="list-title">All Memories</div>
          <button id="new-memory-btn">+ New Memory</button>
        </div>
        <div id="search-bar-wrap">
          <span id="search-icon-el">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="6.5" cy="6.5" r="5"/><path d="m11 11 3 3"/></svg>
          </span>
          <input id="search-input" type="text" placeholder="Search your memories..." autocomplete="off" spellcheck="false" />
          <button id="search-clear-btn" title="Clear">&#x2715;</button>
        </div>
      </div>

      <div id="list-meta"></div>

      <div id="cards-container">
        <div id="loading-overlay">
          <div class="loading-card">
            <div class="spinner"></div>
            Loading memories…
          </div>
        </div>

        <div id="empty-state">
          <div class="empty-icon">🧠</div>
          <h3>No memories yet</h3>
          <p>Start building your memory bank — store facts, notes, code snippets, events, and more.</p>
          <button id="empty-cta">Store First Memory</button>
        </div>

        <div id="cards-grid"></div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div id="right-panel">
      <div id="panel-header">
        <div id="panel-title">New Memory</div>
        <button id="panel-close" title="Close (Esc)">&#x2715;</button>
      </div>
      <div id="panel-body"></div>
      <div id="panel-footer"></div>
    </div>

  </div>
</div>

<!-- TOASTS -->
<div id="toast-container"></div>

<!-- NEW NAMESPACE MODAL -->
<div id="modal-backdrop">
  <div id="ns-modal">
    <h3>New Namespace</h3>
    <div class="field-group">
      <label class="field-label">Name</label>
      <input id="ns-modal-input" class="field-input mono" type="text" placeholder="my-project" autocomplete="off" spellcheck="false" maxlength="64" />
    </div>
    <div id="ns-modal-actions">
      <button class="btn btn-ghost" id="ns-cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="ns-create-btn">Create</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let currentKey    = null;
let currentEmail  = '';
let currentNs     = 'default';
let namespaces    = ['default'];
let memories      = []; // [{key,value,type,created,updated,tags,score?}]
let selectedKey   = null;
let panelMode     = null; // 'new' | 'detail'
let searchTimer   = null;
let isSearchMode  = false;

const BASE = '';

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch(`${BASE}/v1/auth/session`, { credentials: 'include' });
    if (!r.ok) { window.location.href = '/'; return; }
    const session = await r.json();
    currentKey   = session.api_key;
    currentEmail = session.user?.email || session.email || '';
    document.getElementById('user-email').textContent = currentEmail || 'logged in';
    loadNamespaces();
    await fetchMemories();
  } catch (err) {
    toast('Auth failed — redirecting…', 'error');
    setTimeout(() => { window.location.href = '/'; }, 1800);
  }
}

// ─────────────────────────────────────────────
//  API
// ─────────────────────────────────────────────
function authHeaders() {
  return {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${currentKey}`
  };
}

async function api(path, body) {
  const res = await fetch(`${BASE}${path}`, {
    method: 'POST',
    headers: authHeaders(),
    credentials: 'include',
    body: JSON.stringify(body)
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok) {
    throw new Error(json.error || json.message || `HTTP ${res.status}`);
  }
  return json;
}

// Unwrap nested data object (API may return {data:{...}} or flat)
function unwrap(json, key) {
  return json?.data?.[key] ?? json?.[key];
}

// ─────────────────────────────────────────────
//  NAMESPACES
// ─────────────────────────────────────────────
function loadNamespaces() {
  try {
    const stored = JSON.parse(localStorage.getItem('slop_ns') || '[]');
    namespaces = [...new Set(['default', ...stored])];
  } catch (_) {
    namespaces = ['default'];
  }
  renderSidebar();
  renderGlobalNsSelect();
}

function saveNamespaces() {
  localStorage.setItem('slop_ns', JSON.stringify(namespaces.filter(n => n !== 'default')));
}

function renderSidebar() {
  const list = document.getElementById('ns-list');
  list.innerHTML = '';
  namespaces.forEach(ns => {
    const el = document.createElement('div');
    el.className = 'sidebar-item' + (ns === currentNs ? ' active' : '');
    el.innerHTML = `<span class="ns-name">${esc(ns)}</span><span class="badge" id="badge-${esc(ns)}">—</span>`;
    el.onclick = () => switchNs(ns);
    list.appendChild(el);
  });
}

function renderGlobalNsSelect() {
  const sel = document.getElementById('ns-global-select');
  sel.innerHTML = namespaces.map(n =>
    `<option value="${esc(n)}" ${n === currentNs ? 'selected' : ''}>${esc(n)}</option>`
  ).join('');
}

function setBadge(ns, count) {
  const el = document.getElementById(`badge-${esc(ns)}`);
  if (el) el.textContent = count >= 0 ? count : '—';
}

async function switchNs(ns) {
  if (ns === currentNs && memories.length > 0) return;
  currentNs = ns;
  isSearchMode = false;
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear-btn').style.display = 'none';
  renderSidebar();
  renderGlobalNsSelect();
  closePanel();
  await fetchMemories();
}

function openNsModal() {
  document.getElementById('ns-modal-input').value = '';
  document.getElementById('modal-backdrop').classList.add('open');
  setTimeout(() => document.getElementById('ns-modal-input').focus(), 60);
}
function closeNsModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
}

async function createNamespace() {
  const raw = document.getElementById('ns-modal-input').value.trim();
  const ns  = raw.toLowerCase().replace(/[^a-z0-9_\-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
  if (!ns) { toast('Enter a valid namespace name', 'error'); return; }
  if (!namespaces.includes(ns)) {
    namespaces.push(ns);
    saveNamespaces();
  }
  closeNsModal();
  await switchNs(ns);
}

// ─────────────────────────────────────────────
//  FETCH MEMORIES
// ─────────────────────────────────────────────
async function fetchMemories() {
  showLoading(true);
  try {
    const listRes = await api('/v1/memory-list', { namespace: currentNs, limit: 50, offset: 0 });
    const allKeys = (unwrap(listRes, 'keys') || []);
    const keys    = allKeys.slice(0, 20); // batch first 20

    setBadge(currentNs, allKeys.length);

    if (keys.length === 0) {
      memories = [];
      renderCards([], false);
      setMeta(0, allKeys.length, false, '');
      showLoading(false);
      return;
    }

    const results = await Promise.allSettled(
      keys.map(k => api('/v1/memory-get', { key: k, namespace: currentNs }).then(r => ({
        key:     k,
        value:   unwrap(r, 'value')   ?? '',
        type:    unwrap(r, 'type')    ?? 'general',
        created: unwrap(r, 'created') ?? null,
        updated: unwrap(r, 'updated') ?? null,
        tags:    unwrap(r, 'tags')    ?? [],
        score:   null
      })))
    );

    memories = results.filter(r => r.status === 'fulfilled').map(r => r.value);
    renderCards(memories, false);
    setMeta(memories.length, allKeys.length, false, '');
  } catch (err) {
    toast('Load failed: ' + err.message, 'error');
    memories = [];
    renderCards([], false);
  } finally {
    showLoading(false);
  }
}

// ─────────────────────────────────────────────
//  SEARCH
// ─────────────────────────────────────────────
async function doSearch(query) {
  query = query.trim();
  if (!query) {
    isSearchMode = false;
    document.getElementById('list-title').textContent = titleForNs(currentNs);
    await fetchMemories();
    return;
  }
  isSearchMode = true;
  showLoading(true);
  try {
    const res = await api('/v1/memory-search', { query, namespace: currentNs, limit: 30 });
    const raw = unwrap(res, 'results') || [];
    memories = raw.map(r => ({
      key:     r.key,
      value:   r.value   ?? '',
      type:    r.type    ?? 'general',
      created: r.created ?? null,
      updated: r.updated ?? null,
      tags:    r.tags    ?? [],
      score:   r.score   ?? null
    }));
    document.getElementById('list-title').textContent = 'Search Results';
    renderCards(memories, true);
    setMeta(memories.length, null, true, query);
  } catch (err) {
    toast('Search error: ' + err.message, 'error');
  } finally {
    showLoading(false);
  }
}

// ─────────────────────────────────────────────
//  RENDER CARDS
// ─────────────────────────────────────────────
function renderCards(items, isSearch) {
  const grid  = document.getElementById('cards-grid');
  const empty = document.getElementById('empty-state');
  grid.innerHTML = '';

  if (!items.length) {
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  items.forEach(mem => grid.appendChild(makeCard(mem, isSearch)));
}

function makeCard(mem, isSearch) {
  const div = document.createElement('div');
  div.className = 'memory-card' + (mem.key === selectedKey ? ' selected' : '');
  div.dataset.key = mem.key;

  const preview  = (mem.value || '').slice(0, 120) + ((mem.value || '').length > 120 ? '…' : '');
  const typeCls  = `type-${(mem.type || 'general').toLowerCase()}`;
  const dateStr  = fmtDate(mem.updated || mem.created);
  const scoreStr = (isSearch && mem.score != null) ? `<span class="card-score">${Math.round(mem.score * 100)}%</span>` : '';
  const scoreBar = (isSearch && mem.score != null)
    ? `<div class="score-bar" style="width:${Math.round(mem.score*100)}%;background:${scoreColor(mem.score)};"></div>`
    : '';

  div.innerHTML = `
    <div class="card-key">${esc(mem.key)}</div>
    <div class="card-value">${preview ? esc(preview) : '<span style="color:var(--muted2);font-style:italic;font-size:11px;">empty</span>'}</div>
    <div class="card-footer">
      <span class="type-badge ${typeCls}">${esc(mem.type || 'general')}</span>
      ${scoreStr}
      <span class="card-date">${dateStr}</span>
    </div>
    <button class="card-delete" data-memkey="${escAttr(mem.key)}">Delete</button>
    ${scoreBar}
  `;

  div.addEventListener('click', e => {
    if (e.target.classList.contains('card-delete')) return;
    openDetail(mem);
  });
  div.querySelector('.card-delete').addEventListener('click', e => {
    e.stopPropagation();
    confirmDelete(mem.key);
  });
  return div;
}

function scoreColor(s) {
  if (s >= 0.75) return '#22c55e';
  if (s >= 0.45) return '#f59e0b';
  return '#52525b';
}

// ─────────────────────────────────────────────
//  META LINE
// ─────────────────────────────────────────────
function setMeta(shown, total, isSearch, query) {
  const el = document.getElementById('list-meta');
  if (isSearch) {
    el.textContent = `${shown} result${shown !== 1 ? 's' : ''} for "${query}" in ${currentNs}`;
  } else {
    const extra = total > shown ? ` · showing ${shown} of ${total}` : '';
    el.textContent = `${shown} memor${shown !== 1 ? 'ies' : 'y'} in ${currentNs}${extra}`;
    document.getElementById('list-title').textContent = titleForNs(currentNs);
  }
}

function titleForNs(ns) {
  return ns === 'default' ? 'All Memories' : ns;
}

// ─────────────────────────────────────────────
//  LOADING
// ─────────────────────────────────────────────
function showLoading(show) {
  document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
}

// ─────────────────────────────────────────────
//  PANEL CONTROL
// ─────────────────────────────────────────────
function openPanel() {
  document.getElementById('right-panel').classList.add('open');
}
function closePanel() {
  document.getElementById('right-panel').classList.remove('open');
  selectedKey = null;
  panelMode   = null;
  document.querySelectorAll('.memory-card.selected').forEach(c => c.classList.remove('selected'));
}

// ─────────────────────────────────────────────
//  NEW MEMORY PANEL
// ─────────────────────────────────────────────
function openNew() {
  panelMode   = 'new';
  selectedKey = null;
  document.querySelectorAll('.memory-card.selected').forEach(c => c.classList.remove('selected'));
  document.getElementById('panel-title').textContent = 'New Memory';
  renderNewForm();
  openPanel();
}

function nsOptions(selected) {
  return namespaces.map(n => `<option value="${escAttr(n)}" ${n === selected ? 'selected' : ''}>${esc(n)}</option>`).join('');
}
function typeOptions(selected) {
  return ['general','note','fact','event','project','code'].map(t =>
    `<option value="${t}" ${t === selected ? 'selected' : ''}>${t}</option>`
  ).join('');
}

function renderNewForm() {
  document.getElementById('panel-body').innerHTML = `
    <div class="field-group">
      <label class="field-label">Key <span style="color:var(--danger)">*</span></label>
      <input id="f-key" class="field-input mono" type="text" placeholder="user-preferences" autocomplete="off" spellcheck="false" />
    </div>
    <div class="field-group">
      <label class="field-label">Value <span style="color:var(--danger)">*</span></label>
      <textarea id="f-value" class="field-textarea large" placeholder="Enter value…"></textarea>
    </div>
    <div class="field-group">
      <label class="field-label">Namespace</label>
      <select id="f-ns" class="field-select mono">${nsOptions(currentNs)}</select>
    </div>
    <div class="field-group">
      <label class="field-label">Tags <span class="opt">(comma-separated)</span></label>
      <input id="f-tags" class="field-input" type="text" placeholder="ai, research, important" autocomplete="off" />
    </div>
    <div class="field-group">
      <label class="field-label">Type</label>
      <select id="f-type" class="field-select">${typeOptions('general')}</select>
    </div>
  `;
  document.getElementById('panel-footer').innerHTML = `
    <button class="btn btn-ghost" id="pf-cancel">Cancel</button>
    <button class="btn btn-primary btn-expand" id="pf-store">Store Memory</button>
  `;
  document.getElementById('pf-cancel').onclick = closePanel;
  document.getElementById('pf-store').onclick  = storeMemory;
  document.getElementById('f-key').focus();
}

async function storeMemory() {
  const key   = document.getElementById('f-key').value.trim();
  const value = document.getElementById('f-value').value.trim();
  const ns    = document.getElementById('f-ns').value;
  const tags  = document.getElementById('f-tags').value
    .split(',').map(t => t.trim()).filter(Boolean);
  const type  = document.getElementById('f-type').value;

  if (!key)   { toast('Key is required', 'error'); return; }
  if (!value) { toast('Value is required', 'error'); return; }

  const btn = document.getElementById('pf-store');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Storing…';

  try {
    const res = await api('/v1/memory-set', { key, value, namespace: ns, tags, type });
    // Accept if data.status === 'stored', or any 2xx
    toast('Memory stored', 'success');
    closePanel();
    if (ns !== currentNs) await switchNs(ns);
    else await fetchMemories();
  } catch (err) {
    toast('Store failed: ' + err.message, 'error');
    btn.disabled = false;
    btn.innerHTML = 'Store Memory';
  }
}

// ─────────────────────────────────────────────
//  DETAIL PANEL
// ─────────────────────────────────────────────
function openDetail(mem) {
  panelMode   = 'detail';
  selectedKey = mem.key;

  document.querySelectorAll('.memory-card.selected').forEach(c => c.classList.remove('selected'));
  const card = document.querySelector(`.memory-card[data-key="${CSS.escape(mem.key)}"]`);
  if (card) card.classList.add('selected');

  document.getElementById('panel-title').textContent = 'Memory Detail';
  renderDetailForm(mem);
  openPanel();
}

function renderDetailForm(mem) {
  const tags = Array.isArray(mem.tags) ? mem.tags : [];

  document.getElementById('panel-body').innerHTML = `
    <div class="field-group">
      <div class="field-label">Key</div>
      <div class="detail-key-row">
        <span class="detail-key-text" title="${escAttr(mem.key)}">${esc(mem.key)}</span>
        <button class="copy-btn" id="copy-key-btn">Copy</button>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Value <span class="opt">(editable — save to update)</span></label>
      <textarea id="d-value" class="field-textarea large">${esc(mem.value || '')}</textarea>
    </div>

    <div class="field-group">
      <label class="field-label">Type</label>
      <select id="d-type" class="field-select">${typeOptions(mem.type || 'general')}</select>
    </div>

    <div class="field-group">
      <label class="field-label">Tags <span class="opt">(comma-separated)</span></label>
      <input id="d-tags" class="field-input" type="text" value="${escAttr(tags.join(', '))}" />
    </div>

    <div class="meta-grid">
      <div class="meta-cell">
        <div class="meta-cell-label">Created</div>
        <div class="meta-cell-value">${fmtDateFull(mem.created) || '—'}</div>
      </div>
      <div class="meta-cell">
        <div class="meta-cell-label">Updated</div>
        <div class="meta-cell-value">${fmtDateFull(mem.updated) || '—'}</div>
      </div>
      <div class="meta-cell">
        <div class="meta-cell-label">Namespace</div>
        <div class="meta-cell-value" style="font-family:var(--mono);font-size:10px;">${esc(currentNs)}</div>
      </div>
      <div class="meta-cell">
        <div class="meta-cell-label">Score</div>
        <div class="meta-cell-value">${mem.score != null ? Math.round(mem.score * 100) + '%' : '—'}</div>
      </div>
    </div>

    ${tags.length ? `
      <div class="field-group">
        <div class="field-label">Tags</div>
        <div class="tags-row">${tags.map(t => `<span class="tag-chip">${esc(t)}</span>`).join('')}</div>
      </div>
    ` : ''}
  `;

  document.getElementById('panel-footer').innerHTML = `
    <button class="btn btn-danger" id="pf-delete">Delete</button>
    <button class="btn btn-primary btn-expand" id="pf-save">Save Changes</button>
  `;

  document.getElementById('copy-key-btn').onclick = () => copyText(mem.key, document.getElementById('copy-key-btn'));
  document.getElementById('pf-delete').onclick    = () => confirmDelete(mem.key);
  document.getElementById('pf-save').onclick      = () => saveDetail(mem.key);
}

async function saveDetail(key) {
  const value = document.getElementById('d-value').value.trim();
  const type  = document.getElementById('d-type').value;
  const tags  = document.getElementById('d-tags').value
    .split(',').map(t => t.trim()).filter(Boolean);

  if (!value) { toast('Value cannot be empty', 'error'); return; }

  const btn = document.getElementById('pf-save');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Saving…';

  try {
    await api('/v1/memory-set', { key, value, namespace: currentNs, tags, type });
    toast('Memory updated', 'success');
    closePanel();
    await fetchMemories();
  } catch (err) {
    toast('Save failed: ' + err.message, 'error');
    btn.disabled = false;
    btn.innerHTML = 'Save Changes';
  }
}

// ─────────────────────────────────────────────
//  DELETE
// ─────────────────────────────────────────────
function confirmDelete(key) {
  if (!confirm(`Delete memory:\n"${key}"\n\nThis cannot be undone.`)) return;
  deleteMemory(key);
}

async function deleteMemory(key) {
  try {
    const res = await api('/v1/memory-delete', { key, namespace: currentNs });
    const deleted = unwrap(res, 'deleted');
    if (deleted === true || deleted === 'true' || res.ok !== false) {
      toast('Memory deleted', 'success');
      if (selectedKey === key) closePanel();
      await fetchMemories();
    } else {
      throw new Error('Server did not confirm delete');
    }
  } catch (err) {
    toast('Delete failed: ' + err.message, 'error');
  }
}

// ─────────────────────────────────────────────
//  TOASTS
// ─────────────────────────────────────────────
function toast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span class="toast-dot"></span><span>${esc(msg)}</span>`;
  container.appendChild(el);
  setTimeout(() => {
    el.style.animation = 'toastOut 0.2s ease forwards';
    setTimeout(() => el.remove(), 210);
  }, 3200);
}

// ─────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s ?? '').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}

function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(typeof ts === 'number' && ts < 1e12 ? ts * 1000 : ts);
  if (isNaN(d)) return String(ts);
  const diff = (Date.now() - d) / 1000;
  if (diff < 60)     return 'just now';
  if (diff < 3600)   return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400)  return `${Math.floor(diff / 3600)}h ago`;
  if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function fmtDateFull(ts) {
  if (!ts) return '';
  const d = new Date(typeof ts === 'number' && ts < 1e12 ? ts * 1000 : ts);
  if (isNaN(d)) return String(ts);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.style.color = 'var(--success)';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1600);
  }).catch(() => toast('Copy failed', 'error'));
}

// ─────────────────────────────────────────────
//  EVENT WIRING
// ─────────────────────────────────────────────
document.getElementById('panel-close').onclick   = closePanel;
document.getElementById('new-memory-btn').onclick = openNew;
document.getElementById('empty-cta').onclick      = openNew;
document.getElementById('add-namespace-btn').onclick = openNsModal;
document.getElementById('ns-cancel-btn').onclick  = closeNsModal;
document.getElementById('ns-create-btn').onclick  = createNamespace;
document.getElementById('search-shortcut').onclick = () => {
  const inp = document.getElementById('search-input');
  inp.focus(); inp.select();
};

// Global namespace selector in nav
document.getElementById('ns-global-select').onchange = function() {
  switchNs(this.value);
};

// Modal backdrop click
document.getElementById('modal-backdrop').onclick = e => {
  if (e.target === document.getElementById('modal-backdrop')) closeNsModal();
};

// Modal enter/esc
document.getElementById('ns-modal-input').addEventListener('keydown', e => {
  if (e.key === 'Enter')  createNamespace();
  if (e.key === 'Escape') closeNsModal();
});

// Search
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear-btn');

searchInput.addEventListener('input', e => {
  const val = e.target.value;
  searchClear.style.display = val ? 'block' : 'none';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(val), 400);
});
searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    searchInput.value = '';
    searchClear.style.display = 'none';
    doSearch('');
  }
});
searchClear.onclick = () => {
  searchInput.value = '';
  searchClear.style.display = 'none';
  doSearch('');
  searchInput.focus();
};

// Cmd+K / Ctrl+K
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    const inp = document.getElementById('search-input');
    inp.focus(); inp.select();
  }
  if (e.key === 'Escape' && panelMode) closePanel();
});

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
init();
</script>
</body>
</html>
