<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reset Password — Slopshop</title>
<meta name="description" content="Set a new password for your Slopshop account.">
<link rel="canonical" href="https://slopshop.gg/reset-password">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#ff3333">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050505;--s1:#0f0f0f;--s2:#1a1a1a;--b:#1a1a1a;--b2:#2a2a2a;
  --t:#f5f5f5;--t2:#999;--t3:#666;--t4:#444;
  --r:#ff3333;--r2:#ff5555;--g:#00cc66;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--t);-webkit-font-smoothing:antialiased;font-size:0.85rem;line-height:1.75;min-height:100vh;display:flex;flex-direction:column}
a{color:var(--r);text-decoration:none}a:hover{opacity:0.8}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;background:rgba(5,5,5,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--b);display:flex;align-items:center;padding:0 32px}
.nv{max-width:1200px;width:100%;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--mono);font-weight:700;font-size:0.95rem;color:var(--t);text-decoration:none}
.nav-links{display:flex;gap:4px;align-items:center}
.nav-links a{color:var(--t3);font-size:0.75rem;font-weight:500;padding:6px 12px;border-radius:6px}
.nav-links a:hover{color:var(--t);background:var(--s2)}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:80px 24px 48px}
.card{background:var(--s1);border:1px solid var(--b);border-radius:16px;padding:48px 40px;max-width:420px;width:100%}
.card h1{font-family:var(--mono);font-size:1.3rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:8px;text-align:center}
.subtitle{color:var(--t2);font-size:0.8rem;text-align:center;margin-bottom:32px}
label{display:block;font-size:0.72rem;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px}
.pw-row{position:relative;margin-bottom:20px}
.pw-row input{width:100%;padding:12px 44px 12px 14px;background:var(--bg);border:1px solid var(--b2);border-radius:8px;color:var(--t);font-family:var(--sans);font-size:0.85rem;outline:none;transition:border-color 0.2s}
.pw-row input:focus{border-color:var(--r)}
.pw-row input::placeholder{color:var(--t4)}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);cursor:pointer;padding:4px;font-size:0.8rem}
.strength{height:3px;border-radius:2px;margin-top:6px;background:var(--b2);transition:all 0.3s}
.strength-text{font-size:0.7rem;color:var(--t3);margin-top:4px}
.btn{width:100%;padding:14px;background:var(--r);color:#fff;border:none;border-radius:10px;font-family:var(--mono);font-size:0.85rem;font-weight:700;cursor:pointer;transition:background 0.2s;margin-top:4px}
.btn:hover{background:var(--r2)}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.error-msg{display:none;background:rgba(255,51,51,0.1);border:1px solid rgba(255,51,51,0.2);color:var(--r2);padding:10px 14px;border-radius:8px;font-size:0.8rem;margin-bottom:16px;text-align:center}
.invalid-token{text-align:center;padding:24px}
.invalid-token .icon{font-size:2.5rem;margin-bottom:12px}
.invalid-token p{color:var(--t2);margin-bottom:20px;font-size:0.85rem;line-height:1.7}
.success-box{display:none;text-align:center;padding:8px}
.success-box .icon{font-size:2.5rem;margin-bottom:12px}
.success-box h2{font-family:var(--mono);font-size:1rem;font-weight:700;color:var(--g);margin-bottom:8px}
.success-box p{color:var(--t2);font-size:0.8rem;margin-bottom:20px}
.btn-go{display:inline-block;background:var(--r);color:#fff;padding:12px 28px;border-radius:8px;font-family:var(--mono);font-weight:700;font-size:0.85rem}
@media(max-width:480px){.card{padding:36px 24px}}
</style>
</head>
<body>
<nav><div class="nv">
  <a href="/" class="logo">
    <span style="color:#ef4444;font-family:'Courier New',monospace;font-weight:900">SLOPSHOP.gg</span>
  </a>
  <div class="nav-links">
    <a href="/login">Log In</a>
    <a href="/signup" style="background:var(--r);color:#fff;padding:6px 16px;border-radius:6px;font-weight:600">Sign Up</a>
  </div>
</div></nav>

<div class="main">
  <div class="card">

    <!-- No token state -->
    <div id="noToken" class="invalid-token" style="display:none">
      <div class="icon">🔗</div>
      <p>This reset link is invalid or has expired.<br>Request a new one below.</p>
      <a href="/forgot-password" style="display:inline-block;background:var(--r);color:#fff;padding:10px 24px;border-radius:8px;font-family:var(--mono);font-weight:700;font-size:0.82rem">Request New Link</a>
    </div>

    <!-- Reset form -->
    <div id="formSection">
      <h1>Set new password</h1>
      <p class="subtitle">Choose a strong password for your account.</p>

      <div id="error" class="error-msg"></div>

      <form id="resetForm" autocomplete="on">
        <label for="newPassword">New Password</label>
        <div class="pw-row">
          <input type="password" id="newPassword" name="new-password" placeholder="At least 8 characters" required autocomplete="new-password">
          <button type="button" class="pw-toggle" onclick="togglePw('newPassword')">👁</button>
        </div>
        <div id="strengthBar" class="strength"></div>
        <div id="strengthText" class="strength-text"></div>

        <label for="confirmPassword" style="margin-top:16px">Confirm Password</label>
        <div class="pw-row">
          <input type="password" id="confirmPassword" name="confirm-password" placeholder="Repeat your password" required autocomplete="new-password">
          <button type="button" class="pw-toggle" onclick="togglePw('confirmPassword')">👁</button>
        </div>

        <button type="submit" id="submitBtn" class="btn">Update Password</button>
      </form>
    </div>

    <!-- Success -->
    <div id="successSection" class="success-box">
      <div class="icon">✅</div>
      <h2>Password updated!</h2>
      <p>Your password has been changed. Log in with your new password.</p>
      <a href="/login" class="btn-go">Log In Now →</a>
    </div>

  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const token  = params.get('token');

if (!token) {
  document.getElementById('formSection').style.display = 'none';
  document.getElementById('noToken').style.display = 'block';
}

function togglePw(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}

function checkStrength(pw) {
  let score = 0;
  if (pw.length >= 8)   score++;
  if (pw.length >= 12)  score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const levels = [
    { color: '#ff3333', label: 'Weak' },
    { color: '#ff8800', label: 'Fair' },
    { color: '#ffcc00', label: 'Good' },
    { color: '#00cc66', label: 'Strong' },
    { color: '#00cc66', label: 'Very strong' },
  ];
  const l = levels[Math.min(score, 4)];
  document.getElementById('strengthBar').style.background = l.color;
  document.getElementById('strengthBar').style.width = ((score + 1) / 5 * 100) + '%';
  document.getElementById('strengthText').textContent = pw ? l.label : '';
  document.getElementById('strengthText').style.color = l.color;
}

document.getElementById('newPassword').addEventListener('input', e => checkStrength(e.target.value));

document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const newPw  = document.getElementById('newPassword').value;
  const confPw = document.getElementById('confirmPassword').value;
  const btn    = document.getElementById('submitBtn');
  const error  = document.getElementById('error');

  error.style.display = 'none';

  if (newPw !== confPw) {
    error.textContent = 'Passwords do not match.';
    error.style.display = 'block';
    return;
  }
  if (newPw.length < 8) {
    error.textContent = 'Password must be at least 8 characters.';
    error.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Updating...';

  try {
    const res  = await fetch('/v1/auth/reset-password', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ token, new_password: newPw }),
    });
    const data = await res.json();

    if (data.ok) {
      document.getElementById('formSection').style.display = 'none';
      document.getElementById('successSection').style.display = 'block';
    } else {
      error.textContent = data.error?.message || 'Reset failed. The link may have expired.';
      error.style.display = 'block';
      if (data.error?.code === 'invalid_token' || data.error?.code === 'token_expired') {
        setTimeout(() => { location.href = '/forgot-password'; }, 2500);
      }
      btn.disabled = false;
      btn.textContent = 'Update Password';
    }
  } catch(err) {
    error.textContent = 'Connection error. Try again.';
    error.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Update Password';
  }
});
</script>
</body>
</html>
