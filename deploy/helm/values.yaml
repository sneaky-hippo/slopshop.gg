replicaCount: 1
image:
  repository: slopshop/slopshop
  tag: "3.7.0"
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 3000
env:
  SLOPSHOP_BASE: "https://slopshop.gg"
  NODE_ENV: "production"
persistence:
  enabled: true
  size: 1Gi
  mountPath: /app/data
resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "1000m"
