<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#09090b"/>
  <rect x="0" y="0" width="1200" height="4" fill="#ef4444"/>
  <!-- Grid dots background -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#27272a"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Glow -->
  <circle cx="600" cy="250" r="300" fill="#ef4444" opacity="0.03"/>
  <!-- Lobster -->
  <text x="600" y="200" text-anchor="middle" font-size="80" fill="#ef4444" opacity="0.15">&#129438;</text>
  <!-- Title -->
  <text x="600" y="280" text-anchor="middle" font-family="monospace" font-size="72" font-weight="900" letter-spacing="8">
    <tspan fill="#ef4444">SLOP</tspan><tspan fill="#fafafa">SHOP</tspan><tspan fill="#52525b">.GG</tspan>
  </text>
  <!-- Subtitle -->
  <text x="600" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" fill="#a1a1aa">
    243 Real APIs. Zero Mocks. For AI Agents.
  </text>
  <!-- Stats bar -->
  <rect x="200" y="380" width="800" height="1" fill="#27272a"/>
  <text x="300" y="430" text-anchor="middle" font-family="monospace" font-size="36" font-weight="800" fill="#ef4444">243</text>
  <text x="300" y="455" text-anchor="middle" font-family="monospace" font-size="13" fill="#71717a">REAL APIs</text>
  <text x="500" y="430" text-anchor="middle" font-family="monospace" font-size="36" font-weight="800" fill="#f97316">18</text>
  <text x="500" y="455" text-anchor="middle" font-family="monospace" font-size="13" fill="#71717a">CATEGORIES</text>
  <text x="700" y="430" text-anchor="middle" font-family="monospace" font-size="36" font-weight="800" fill="#22c55e">0</text>
  <text x="700" y="455" text-anchor="middle" font-family="monospace" font-size="13" fill="#71717a">MOCKS</text>
  <text x="900" y="430" text-anchor="middle" font-family="monospace" font-size="36" font-weight="800" fill="#06b6d4">1cr</text>
  <text x="900" y="455" text-anchor="middle" font-family="monospace" font-size="13" fill="#71717a">PER CALL</text>
  <!-- Code snippet -->
  <rect x="250" y="490" width="700" height="90" rx="8" fill="#18181b" stroke="#27272a"/>
  <text x="280" y="525" font-family="monospace" font-size="15" fill="#71717a">$</text>
  <text x="300" y="525" font-family="monospace" font-size="15" fill="#fafafa">slop call crypto-hash-sha256 --data "hello"</text>
  <text x="280" y="555" font-family="monospace" font-size="14" fill="#22c55e">{"_engine": "real", "hash": "2cf24dba..."}</text>
  <!-- URL -->
  <text x="600" y="615" text-anchor="middle" font-family="monospace" font-size="16" fill="#52525b">slopshop.gg</text>
</svg>
