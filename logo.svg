<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Lobster claw / API bracket mashup -->
  <rect width="40" height="40" rx="8" fill="#ff3333"/>
  <!-- Left claw = opening bracket { -->
  <path d="M14 10c-3 0-4 2-4 4v4c0 2-1 3-3 3 2 0 3 1 3 3v4c0 2 1 4 4 4" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Right claw = closing bracket } -->
  <path d="M26 10c3 0 4 2 4 4v4c0 2 1 3 3 3-2 0-3 1-3 3v4c0 2-1 4-4 4" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Dot in center = the API call -->
  <circle cx="20" cy="21" r="2.5" fill="white"/>
</svg>
